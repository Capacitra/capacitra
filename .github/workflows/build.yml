name: Build Capacitra.exe

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.python-version }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile check
        run: python -m py_compile Capacitra.pyw

      - name: Generate icon
        run: python make_icon.py

      - name: Build executable
        run: pyinstaller --clean Capacitra.spec

      - name: Compute SHA-256
        id: sha
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Path dist\Capacitra.exe -Algorithm SHA256).Hash.ToLower()
          echo "sha256=$hash" >> $env:GITHUB_OUTPUT
          echo "Capacitra.exe SHA-256: $hash"

      - name: Sign executable (release only, requires secrets)
        if: github.event_name == 'release'
        shell: pwsh
        continue-on-error: true
        run: |
          if ($env:CERT_PFX_BASE64 -and $env:CERT_PASSWORD) {
            $pfx = "$env:RUNNER_TEMP\cert.pfx"
            [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERT_PFX_BASE64))
            & signtool sign /f $pfx /p $env:CERT_PASSWORD `
              /fd sha256 /tr http://timestamp.digicert.com /td sha256 `
              dist\Capacitra.exe
            Remove-Item $pfx
          } else {
            Write-Host "No CERT_PFX_BASE64 secret set, skipping signing."
          }
        env:
          CERT_PFX_BASE64: ${{ secrets.CERT_PFX_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Capacitra-${{ github.sha }}
          path: dist/Capacitra.exe
          retention-days: 30

      - name: Attach to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Capacitra.exe
          body_path: CHANGELOG_v4.1.md
          fail_on_unmatched_files: true
